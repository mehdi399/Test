<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>موقع الألعاب الأول</title>
<style>
/* إعدادات عامة */
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  margin:0;
  padding:0;
  text-align:center;
}

/* الهيدر */
header {
  background-color: rgba(0,0,0,0.6);
  color:white;
  padding:30px 0;
  box-shadow:0 4px 8px rgba(0,0,0,0.2);
  <small>مالك الموقع: only.fixa399</small>
}
h1 {
  margin:0;
  font-size:36px;
}
p {
  font-size:18px;
  color:#fff;
}

/* القسم الرئيسي */
section {
  margin: 30px auto;
  width: 90%;
  max-width: 900px;
  text-align: center;
}

/* بطاقة الألعاب */
.game-card {
  background: white;
  border-radius: 15px;
  padding: 20px;
  margin: 15px;
  display: inline-block;
  width: 250px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  transition: transform 0.3s;
}
.game-card:hover {
  transform: scale(1.05);
}

/* أزرار */
button {
  background:#3498db;
  color:white;
  border:none;
  padding:12px 25px;
  margin-top:10px;
  font-size:16px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}
button:hover {
  background:#2980b9;
}

/* نموذج الرسائل */
textarea {
  width:80%;
  max-width:500px;
  height:100px;
  padding:10px;
  font-size:16px;
  border-radius:10px;
  border:2px solid #3498db;
  resize:none;
}

/* الفوتر */
footer {
  margin-top:40px;
  padding:20px 0;
  background: rgba(0,0,0,0.4);
  color:white;
}
</style>
</head>
<body>

<header>
  <small>مالك الموقع: only.fixa399</small>
  <h1>مرحبا بكم في موقع الألعاب الأول</h1>
  <p>استمتع بألعاب ممتعة وأرسل لنا اقتراحاتك!</p>
</header>

<section>
  <h2>ألعابنا المميزة 🎮</h2>
  <div class="game-card">
    <h3>لعبة 1</h3>
    <p>لعبة بسيطة للتسلية</p>
    <button onclick="alert('تم فتح لعبة 1!')">ابدأ اللعب</button>
  </div>
  <div class="game-card">
    <h3>لعبة 2</h3>
    <p>تحدى أصدقائك!</p>
    <button onclick="alert('تم فتح لعبة 2!')">ابدأ اللعب</button>
  </div>
  <div class="game-card">
    <h3>لعبة 3</h3>
    <p>اختبر مهاراتك</p>
    <button onclick="alert('تم فتح لعبة 3!')">ابدأ اللعب</button>
  </div>
</section>

<section>
  <h2>أرسل اقتراحك أو رسالتك 💬</h2>
  <form>
    <!-- نموذج Jotform -->
    <script type="text/javascript" src="https://form.jotform.com/jsform/260685612032048"></script>
  </form>
</section>

<footer>
  <p>© 2026 موقع الألعاب الأول</p>
</footer>

</body>
</html>
<small>مالك الموقع: only.fixa399</small>
