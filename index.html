<head>

body {

}

header {
  background-color: rgba(0,0,0,0.5);
  color: white;
  padding: 30px 0;

}

h1 {
  margin: 0;
  font-size: 36px;
}

p {
  font-size: 18px;
  color: #333;
}

  width: 80%;
  max-width: 500px;
  height: 100px;

  resize: none;
}

button {
  background-color: #3498db;
  color: white;
  border: none;
  padding: 12px 25px;
  margin-top: 10px;
  font-size: 18px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background-color: #2980b9;
}

form {
  margin-top: 30px;
}

footer {
  margin-top: 40px;
  padding: 20px 0;

  color: white;
}
</style>
</head>

<body>
